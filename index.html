<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloom Surprise</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-a: #2c003e;
            --bg-b: #12021f;
            --bg-c: #080112;
            --accent: #ff5ca7;
            --accent-soft: #ffd4ec;
            --card: rgba(255, 255, 255, 0.11);
            --text: #fff;
            --text-soft: #ffdeef;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Poppins", sans-serif;
            color: var(--text);
            overflow-x: hidden;
            overflow-y: auto;
            background:
                radial-gradient(circle at 15% 20%, #7c2f9b 0%, transparent 35%),
                radial-gradient(circle at 85% 75%, #5a1f7f 0%, transparent 40%),
                linear-gradient(145deg, var(--bg-a), var(--bg-b), var(--bg-c));
            transition: background 800ms ease;
        }

        body.theme-2 {
            --accent: #ff7f6d;
            --accent-soft: #ffe2d9;
            --card: rgba(255, 255, 255, 0.14);
            background:
                radial-gradient(circle at 25% 15%, #ff8aa0 0%, transparent 35%),
                radial-gradient(circle at 78% 75%, #ffad66 0%, transparent 38%),
                linear-gradient(145deg, #3f1027, #221122, #100919);
        }

        body.theme-3 {
            --accent: #7f7bff;
            --accent-soft: #dbd9ff;
            --card: rgba(255, 255, 255, 0.12);
            background:
                radial-gradient(circle at 20% 20%, #4a5bff 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, #9a5fff 0%, transparent 42%),
                linear-gradient(145deg, #090f33, #160f2d, #080715);
        }

        body.theme-4 {
            --accent: #7ad8ff;
            --accent-soft: #e6f7ff;
            --card: rgba(230, 247, 255, 0.16);
            background:
                radial-gradient(circle at 20% 18%, #bdeaff 0%, transparent 34%),
                radial-gradient(circle at 80% 78%, #9cccf5 0%, transparent 38%),
                linear-gradient(145deg, #0f2b45, #133656, #0a1d31);
        }

        .wrapper {
            position: relative;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 22px;
            isolation: isolate;
        }

        .lights {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: -1;
        }

        .lights::before,
        .lights::after {
            content: "";
            position: absolute;
            width: 28vmax;
            aspect-ratio: 1;
            border-radius: 50%;
            filter: blur(26px);
            opacity: 0.5;
            animation: drift 9s ease-in-out infinite alternate;
        }

        .lights::before {
            top: 8%;
            left: 8%;
            background: color-mix(in srgb, var(--accent), #ffffff 20%);
        }

        .lights::after {
            right: 8%;
            bottom: 12%;
            background: color-mix(in srgb, var(--accent), #591b84 40%);
            animation-delay: -2s;
        }

        @keyframes drift {
            0% {
                transform: translate(0, 0) scale(0.95);
            }

            100% {
                transform: translate(16px, -20px) scale(1.08);
            }
        }

        .card {
            width: min(760px, 100%);
            max-height: calc(100vh - 28px);
            overflow: auto;
            background: var(--card);
            border: 1px solid rgba(255, 255, 255, 0.28);
            border-radius: 28px;
            backdrop-filter: blur(8px);
            box-shadow: 0 24px 50px rgba(0, 0, 0, 0.35);
            padding: clamp(18px, 3vw, 32px);
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.35) transparent;
        }

        .title {
            margin: 0;
            font-size: clamp(1.6rem, 4vw, 2.6rem);
            font-weight: 700;
            text-align: center;
            letter-spacing: 0.4px;
            line-height: 1.2;
            overflow-wrap: anywhere;
            word-break: break-word;
        }

        .subtitle {
            margin: 8px 0 0;
            text-align: center;
            color: var(--text-soft);
            font-size: clamp(0.95rem, 2.3vw, 1.15rem);
            min-height: 54px;
            line-height: 1.45;
            overflow-wrap: anywhere;
        }

        .flower-stage {
            margin: 16px auto 18px;
            width: min(62vw, 250px);
            aspect-ratio: 1.06;
            position: relative;
            display: grid;
            place-items: center;
            isolation: isolate;
        }

        .flower {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            animation: float 5s ease-in-out infinite;
            transform: scale(var(--flower-scale, 0.9));
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .petal {
            position: absolute;
            top: 50%;
            left: 50%;
            width: var(--petal-width, 30%);
            height: var(--petal-height, 46%);
            border-radius: 50% 50% 45% 45%;
            transform-origin: center var(--petal-origin, 78%);
            background: radial-gradient(circle at 35% 30%, #ffffff, color-mix(in srgb, var(--accent), #ffb6e0 18%) 32%, color-mix(in srgb, var(--accent), #671652 16%) 88%);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.24);
            opacity: 0;
            animation: bloom 1300ms ease forwards;
        }

        .petal::after {
            content: "";
            position: absolute;
            inset: 30% 38%;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.75);
            filter: blur(2px);
        }

        @keyframes bloom {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) rotate(var(--r)) translateY(0) scale(0.08);
            }

            100% {
                opacity: 1;
                transform: translate(-50%, -50%) rotate(var(--r)) translateY(var(--petal-y, -26%)) scale(1);
            }
        }

        .core {
            position: absolute;
            width: 22%;
            aspect-ratio: 1;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #fff7bf, #ffcb4f 65%, #e99a00 100%);
            box-shadow: 0 0 22px rgba(255, 214, 102, 0.9);
            z-index: 2;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.08);
            }
        }

        .spark {
            position: absolute;
            width: 8px;
            aspect-ratio: 1;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.82);
            filter: blur(1px);
            top: var(--top);
            left: var(--left);
            animation: twinkle var(--d) ease-in-out infinite;
            animation-delay: var(--delay);
        }

        @keyframes twinkle {

            0%,
            100% {
                transform: scale(0.55);
                opacity: 0.25;
            }

            50% {
                transform: scale(1.25);
                opacity: 0.9;
            }
        }

        .controls {
            margin-top: 16px;
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 10px;
        }

        .name-input {
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.28);
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.22);
            color: #fff;
            padding: 12px;
            font-size: 0.95rem;
            outline: none;
        }

        .btn {
            border: 0;
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 0.92rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 200ms ease, opacity 200ms ease;
            white-space: nowrap;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.22);
        }

        .hint {
            text-align: center;
            margin-top: 12px;
            color: rgba(255, 255, 255, 0.82);
            font-size: 0.86rem;
            line-height: 1.4;
            overflow-wrap: anywhere;
        }

        .surprise {
            margin-top: 12px;
            text-align: center;
            color: var(--accent-soft);
            font-size: clamp(0.95rem, 2.3vw, 1.08rem);
            min-height: 48px;
            line-height: 1.5;
            overflow-wrap: anywhere;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 400ms ease, transform 400ms ease;
        }

        .surprise.show {
            opacity: 1;
            transform: translateY(0);
        }

        .shayari {
            margin-top: 8px;
            text-align: center;
            font-size: clamp(0.92rem, 2.2vw, 1.05rem);
            color: #fff9c9;
            min-height: 44px;
            line-height: 1.5;
            opacity: 0.95;
            overflow-wrap: anywhere;
        }

        .reaction {
            margin: 2px auto 0;
            width: fit-content;
            max-width: 100%;
            padding: 8px 12px;
            border-radius: 999px;
            font-size: 0.85rem;
            line-height: 1.3;
            color: #fff;
            background: rgba(255, 255, 255, 0.14);
            border: 1px solid rgba(255, 255, 255, 0.24);
            white-space: normal;
            text-align: center;
            overflow-wrap: anywhere;
        }

        .proposal {
            margin-top: 14px;
            padding: 14px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.24);
            background: rgba(255, 255, 255, 0.08);
            display: none;
        }

        .proposal.show {
            display: block;
        }

        .proposal-title {
            margin: 0 0 10px;
            text-align: center;
            font-size: 1.04rem;
            color: #fff4fb;
            font-weight: 600;
        }

        .proposal-actions {
            position: relative;
            min-height: 64px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 6px;
        }

        .btn-yes {
            background: #2bc56e;
            color: #fff;
        }

        .btn-no {
            position: absolute;
            background: #ff4d77;
            color: #fff;
            left: 62%;
            top: 8px;
            width: auto;
            min-width: 96px;
            transition: left 150ms ease, top 150ms ease, transform 130ms ease;
        }

        .btn-no.shake {
            animation: noShake 240ms linear 2;
        }

        @keyframes noShake {
            0% {
                transform: translateY(0);
            }

            25% {
                transform: translateY(-4px);
            }

            50% {
                transform: translateY(4px);
            }

            75% {
                transform: translateY(-3px);
            }

            100% {
                transform: translateY(0);
            }
        }

        .final-reply {
            margin: 10px 0 0;
            min-height: 22px;
            text-align: center;
            color: #ffe7f5;
            font-size: 0.95rem;
            line-height: 1.4;
            overflow-wrap: anywhere;
        }

        .fall {
            position: fixed;
            top: -24px;
            font-size: 18px;
            pointer-events: none;
            z-index: 5;
            animation: fall linear forwards;
            filter: drop-shadow(0 2px 3px rgba(0, 0, 0, 0.25));
        }

        @keyframes fall {
            0% {
                transform: translateY(-10px) rotate(0deg);
                opacity: 0;
            }

            15% {
                opacity: 1;
            }

            100% {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0;
            }
        }

        @media (max-width: 680px) {
            .wrapper {
                padding: 12px;
            }

            .card {
                border-radius: 20px;
                max-height: calc(100vh - 12px);
                padding: 14px;
            }

            .controls {
                grid-template-columns: 1fr;
            }

            .controls .btn {
                width: 100%;
                white-space: normal;
            }

            .proposal-actions .btn {
                width: auto;
                min-width: 110px;
            }

            .flower-stage {
                width: min(62vw, 220px);
                margin: 10px auto 12px;
            }

            .hint {
                font-size: 0.8rem;
            }

            .proposal-actions {
                min-height: 110px;
            }

            .btn-no {
                left: 55%;
            }
        }
    </style>
</head>

<body class="theme-1">
    <main class="wrapper">
        <div class="lights"></div>

        <section class="card">
            <h1 class="title" id="titleText">For Someone Special</h1>
            <p class="subtitle" id="subtitleText">A flower that blooms just for you.</p>

            <div class="flower-stage">
                <div class="flower" id="flower"></div>
                <div class="core"></div>
            </div>

            <p class="surprise" id="surpriseText"></p>
            <p class="shayari" id="shayariText"></p>
            <div class="reaction" id="reactionText">✨ Surprise Mode: Ready</div>

            <div class="controls">
                <input id="nameInput" class="name-input" type="text" placeholder="Yahan naam likho...">
                <button id="setNameBtn" class="btn btn-secondary">Set Name</button>
                <button id="surpriseBtn" class="btn btn-primary">Next Surprise</button>
            </div>

            <div class="proposal" id="proposalBox">
                <p class="proposal-title">Do you love me? ❄️</p>
                <div class="proposal-actions" id="proposalArea">
                    <button id="yesBtn" class="btn btn-yes">Yes 💖</button>
                    <button id="noBtn" class="btn btn-no" type="button">No 😅</button>
                </div>
                <p class="final-reply" id="finalReply"></p>
            </div>
        </section>
    </main>

    <script>
        const flower = document.getElementById("flower");
        const surpriseText = document.getElementById("surpriseText");
        const titleText = document.getElementById("titleText");
        const subtitleText = document.getElementById("subtitleText");
        const shayariText = document.getElementById("shayariText");
        const reactionText = document.getElementById("reactionText");
        const nameInput = document.getElementById("nameInput");
        const setNameBtn = document.getElementById("setNameBtn");
        const surpriseBtn = document.getElementById("surpriseBtn");
        const proposalBox = document.getElementById("proposalBox");
        const proposalArea = document.getElementById("proposalArea");
        const yesBtn = document.getElementById("yesBtn");
        const noBtn = document.getElementById("noBtn");
        const finalReply = document.getElementById("finalReply");
        let isNameLocked = false;
        let noMoveStage = 0;

        function renderFlower(config) {
            const { petals, scale, petalWidth, petalHeight, petalY, petalOrigin } = config;
            flower.innerHTML = "";
            flower.style.setProperty("--flower-scale", scale);
            flower.style.setProperty("--petal-width", petalWidth);
            flower.style.setProperty("--petal-height", petalHeight);
            flower.style.setProperty("--petal-y", petalY);
            flower.style.setProperty("--petal-origin", petalOrigin);

            for (let i = 0; i < petals; i += 1) {
                const petal = document.createElement("span");
                petal.className = "petal";
                petal.style.setProperty("--r", `${(360 / petals) * i}deg`);
                petal.style.animationDelay = `${i * 65}ms`;
                flower.appendChild(petal);
            }

            for (let i = 0; i < 18; i += 1) {
                const spark = document.createElement("span");
                spark.className = "spark";
                spark.style.setProperty("--top", `${10 + Math.random() * 76}%`);
                spark.style.setProperty("--left", `${10 + Math.random() * 76}%`);
                spark.style.setProperty("--d", `${1300 + Math.random() * 1700}ms`);
                spark.style.setProperty("--delay", `${-(Math.random() * 1800)}ms`);
                flower.appendChild(spark);
            }
        }

        const surprises = [
            {
                theme: "theme-1",
                subtitle: "Spring theme: fresh flowers and soft breeze.",
                text: "Surprise 1 (Spring): Tumhari smile se har garden me naya rang aa jata hai.",
                shayari: "Bahar ka mausam bole dheere se, tum ho to har din mehka-mehka lage.",
                reaction: "🌱 Spring Bloom Vibe",
                symbol: "🌸",
                flower: { petals: 12, scale: 0.9, petalWidth: "30%", petalHeight: "46%", petalY: "-26%", petalOrigin: "78%" }
            },
            {
                theme: "theme-2",
                subtitle: "Summer theme: bright sun and warm energy.",
                text: "Surprise 2 (Summer): Tumhari hansi se garmi bhi pyari lagne lagti hai.",
                shayari: "Dhoop tez sahi, par tum saath ho to har pal halka sa sukoon deta hai.",
                reaction: "☀️ Summer Glow Vibe",
                symbol: "🌻",
                flower: { petals: 14, scale: 0.92, petalWidth: "28%", petalHeight: "44%", petalY: "-25%", petalOrigin: "76%" }
            },
            {
                theme: "theme-3",
                subtitle: "Autumn theme: cozy air and falling leaves.",
                text: "Surprise 3 (Autumn): Tumhare saath har badalta mausam aur bhi khoobsurat lagta hai.",
                shayari: "Patton ki tarah rang badlein lamhe, par dil ka ehsaas tumhare liye wahi rahe.",
                reaction: "🍁 Autumn Cozy Vibe",
                symbol: "🍂",
                flower: { petals: 10, scale: 0.88, petalWidth: "32%", petalHeight: "47%", petalY: "-27%", petalOrigin: "82%" }
            },
            {
                theme: "theme-4",
                subtitle: "Winter theme: cool breeze and snowy magic.",
                text: "Surprise 4 (Winter): Tum ho to thandi raat bhi warm lagti hai.",
                shayari: "Sardi ki raat me bhi ek noor sa jagta hai, tumhara khayal dil ko garam rakhta hai.",
                reaction: "❄️ Winter Magic Vibe",
                symbol: "❄️",
                flower: { petals: 16, scale: 0.94, petalWidth: "26%", petalHeight: "42%", petalY: "-24%", petalOrigin: "74%" }
            },
            {
                theme: "theme-1",
                subtitle: "Spring again: blossoms and new hopes.",
                text: "Surprise 5 (Spring): Har nayi kali ki tarah tum par pyaar aur naya lagta hai.",
                shayari: "Har subah ek nayi mehak laaye, tumhara naam dil ko muskuraye.",
                reaction: "🌷 Spring Fresh Vibe",
                symbol: "🌼",
                flower: { petals: 11, scale: 0.9, petalWidth: "31%", petalHeight: "45%", petalY: "-26%", petalOrigin: "80%" }
            },
            {
                theme: "theme-2",
                subtitle: "Summer nights: warm lights and sweet talks.",
                text: "Surprise 6 (Summer): Tumhara naam sunte hi mood bright ho jata hai.",
                shayari: "Garam hawao me bhi tumhari baat thandak si de jati hai.",
                reaction: "🍹 Summer Love Vibe",
                symbol: "🌞",
                flower: { petals: 13, scale: 0.92, petalWidth: "29%", petalHeight: "43%", petalY: "-25%", petalOrigin: "76%" }
            },
            {
                theme: "theme-4",
                subtitle: "Final winter surprise before a snowy question...",
                text: "Surprise 7 (Winter): Snowfall ki tarah tumhara pyaar dil par softly girta hai.",
                shayari: "Barf ke phoolon me bhi tumhari yaad chamakti hai.",
                reaction: "☃️ Snowy Final Vibe",
                symbol: "☃️",
                flower: { petals: 15, scale: 0.94, petalWidth: "27%", petalHeight: "42%", petalY: "-24%", petalOrigin: "74%" }
            }
        ];

        let surpriseIndex = 0;

        function applyName(name) {
            const finalName = name && name.trim() ? name.trim() : "Someone Special";
            titleText.textContent = `For ${finalName} 💖`;
            document.title = `For ${finalName}`;
        }

        function lockNameInput() {
            isNameLocked = true;
            nameInput.disabled = true;
            nameInput.readOnly = true;
            nameInput.style.opacity = "0.7";
            setNameBtn.style.display = "none";
            nameInput.placeholder = "Name locked for this session";
        }

        function replayBloom() {
            const petals = [...document.querySelectorAll(".petal")];
            petals.forEach((petal, idx) => {
                petal.style.animation = "none";
                petal.offsetHeight;
                petal.style.animation = `bloom 1300ms ease forwards`;
                petal.style.animationDelay = `${idx * 95}ms`;
            });
        }

        function playFall(symbol) {
            for (let i = 0; i < 16; i += 1) {
                const fall = document.createElement("span");
                fall.className = "fall";
                fall.textContent = symbol;
                fall.style.left = `${Math.random() * 100}vw`;
                fall.style.animationDuration = `${2.4 + Math.random() * 2.4}s`;
                fall.style.fontSize = `${14 + Math.random() * 14}px`;
                document.body.appendChild(fall);
                setTimeout(() => fall.remove(), 5200);
            }
        }

        function maybeShowProposal() {
            if (surpriseIndex === surprises.length - 1) {
                proposalBox.classList.add("show");
                noMoveStage = 0;
                noBtn.style.left = "62%";
                noBtn.style.top = "8px";
                proposalBox.scrollIntoView({ behavior: "smooth", block: "nearest" });
            } else {
                proposalBox.classList.remove("show");
                finalReply.textContent = "";
            }
        }

        function showSurprise() {
            surpriseIndex = (surpriseIndex + 1) % surprises.length;
            const current = surprises[surpriseIndex];

            document.body.classList.remove("theme-1", "theme-2", "theme-3", "theme-4");
            document.body.classList.add(current.theme);
            subtitleText.textContent = current.subtitle;
            surpriseText.textContent = current.text;
            shayariText.textContent = current.shayari;
            reactionText.textContent = `✨ ${current.reaction}`;
            surpriseText.classList.remove("show");
            requestAnimationFrame(() => surpriseText.classList.add("show"));
            playFall(current.symbol);
            renderFlower(current.flower);
            replayBloom();
            maybeShowProposal();
        }

        setNameBtn.addEventListener("click", () => {
            if (isNameLocked) return;
            applyName(nameInput.value);
            surpriseText.textContent = "Naam set ho gaya. Ab surprise button dabao ✨";
            shayariText.textContent = "Naam me bhi ek jaadu hai, tum ho to har lamha khubsurat hai.";
            reactionText.textContent = "✅ Name Saved";
            surpriseText.classList.add("show");
            lockNameInput();
        });

        surpriseBtn.addEventListener("click", (event) => {
            if (!isNameLocked) {
                event.preventDefault();
                surpriseText.textContent = "Pehle naam set karo, phir Next Surprise chalega ✍️";
                shayariText.textContent = "Naam ke bina kahani adhoori hai, pehle apna naam likho.";
                reactionText.textContent = "⚠️ Name Required";
                surpriseText.classList.add("show");
                return;
            }
            showSurprise();
        });

        yesBtn.addEventListener("click", () => {
            finalReply.textContent = "Meri side se reply: I love you too jaan! Hamesha saath rahunga. 💖";
            reactionText.textContent = "✅ Proposal Accepted";
            playFall("💘");
        });

        function moveNoButton() {
            const areaRect = proposalArea.getBoundingClientRect();
            const btnRect = noBtn.getBoundingClientRect();
            const yesRect = yesBtn.getBoundingClientRect();
            const pad = 8;
            const maxX = Math.max(pad, areaRect.width - btnRect.width - pad);
            const maxY = Math.max(pad, areaRect.height - btnRect.height - pad);

            if (noMoveStage === 0) {
                noBtn.style.top = `${pad}px`;
                noBtn.style.left = `${Math.max(pad, (areaRect.width - btnRect.width) / 2)}px`;
                noMoveStage = 1;
            } else if (noMoveStage === 1) {
                noBtn.style.top = `${pad}px`;
                noBtn.style.left = `${maxX}px`;
                noMoveStage = 2;
            } else {
                const yesTop = yesRect.top - areaRect.top;
                const yesBottom = yesRect.bottom - areaRect.top;
                let newX = Math.random() * maxX;
                let newY = Math.random() * maxY;
                let attempts = 0;

                while (
                    attempts < 12 &&
                    newY + btnRect.height > yesTop - 6 &&
                    newY < yesBottom + 6
                ) {
                    newX = Math.random() * maxX;
                    newY = Math.random() * maxY;
                    attempts += 1;
                }

                noBtn.style.left = `${newX}px`;
                noBtn.style.top = `${newY}px`;
            }
            noBtn.classList.remove("shake");
            noBtn.offsetHeight;
            noBtn.classList.add("shake");
        }

        noBtn.addEventListener("click", (event) => {
            event.preventDefault();
            moveNoButton();
        });
        noBtn.addEventListener("touchstart", (event) => {
            event.preventDefault();
            moveNoButton();
        }, { passive: false });

        const queryName = new URLSearchParams(window.location.search).get("name");
        if (queryName) {
            nameInput.value = queryName;
            lockNameInput();
        }
        applyName(queryName || "");
        surpriseText.textContent = surprises[0].text;
        subtitleText.textContent = surprises[0].subtitle;
        shayariText.textContent = surprises[0].shayari;
        reactionText.textContent = `✨ ${surprises[0].reaction}`;
        renderFlower(surprises[0].flower);
        surpriseText.classList.add("show");
    </script>
</body>

</html>
